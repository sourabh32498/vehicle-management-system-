<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="1700" viewBox="0 0 1300 1700">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 19px Arial, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2.6; rx: 18; ry: 18; }
      .decision { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2.6; }
      .startend { fill: #111827; stroke: #111827; stroke-width: 2; }
      .arrow { stroke: #334155; stroke-width: 2.6; fill: none; marker-end: url(#arrowhead); }
      .yesno { font: 700 14px Arial, sans-serif; fill: #1d4ed8; }
      .swim { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#334155" />
    </marker>
  </defs>

  <rect x="40" y="40" width="1220" height="1620" fill="#f8fbff" stroke="#dbeafe" stroke-width="2" rx="24" ry="24" />
  <text x="650" y="88" text-anchor="middle" class="title">Vehicle Management System Activity Diagram</text>

  <rect x="90" y="130" width="1120" height="1470" class="swim" rx="24" ry="24" />
  <line x1="650" y1="130" x2="650" y2="1600" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8" />
  <text x="370" y="175" text-anchor="middle" class="label">User</text>
  <text x="930" y="175" text-anchor="middle" class="label">System</text>

  <circle cx="370" cy="240" r="22" class="startend" />
  <text x="370" y="278" text-anchor="middle" class="small">Start</text>

  <rect x="190" y="320" width="360" height="78" class="box" />
  <text x="370" y="367" text-anchor="middle" class="text">Open Vehicle Management System</text>
  <path d="M370 262 L370 320" class="arrow" />

  <rect x="750" y="320" width="360" height="78" class="box" />
  <text x="930" y="358" text-anchor="middle" class="text">Load homepage or login page</text>
  <text x="930" y="380" text-anchor="middle" class="small">Prepare UI for user interaction</text>
  <path d="M550 359 L750 359" class="arrow" />

  <rect x="190" y="450" width="360" height="78" class="box" />
  <text x="370" y="488" text-anchor="middle" class="text">Enter username and password</text>
  <text x="370" y="510" text-anchor="middle" class="small">Submit login credentials</text>
  <path d="M930 398 L930 489 L550 489" class="arrow" />

  <rect x="750" y="450" width="360" height="78" class="box" />
  <text x="930" y="488" text-anchor="middle" class="text">Authenticate user and check role</text>
  <text x="930" y="510" text-anchor="middle" class="small">Validate credentials and permissions</text>
  <path d="M550 489 L750 489" class="arrow" />

  <polygon points="930,590 1025,665 930,740 835,665" class="decision" />
  <text x="930" y="658" text-anchor="middle" class="text">Valid</text>
  <text x="930" y="680" text-anchor="middle" class="text">login?</text>
  <path d="M930 528 L930 590" class="arrow" />

  <rect x="750" y="805" width="360" height="78" class="box" />
  <text x="930" y="843" text-anchor="middle" class="text">Show error message</text>
  <text x="930" y="865" text-anchor="middle" class="small">Ask user to try again</text>
  <path d="M930 740 L930 805" class="arrow" />
  <text x="948" y="775" class="yesno">No</text>

  <path d="M750 844 L610 844 L610 489 L550 489" class="arrow" />

  <rect x="750" y="960" width="360" height="78" class="box" />
  <text x="930" y="998" text-anchor="middle" class="text">Load dashboard based on role</text>
  <text x="930" y="1020" text-anchor="middle" class="small">Super Admin, Admin, or Staff workspace</text>
  <path d="M1025 665 L1140 665 L1140 999 L1110 999" class="arrow" />
  <text x="1048" y="648" class="yesno">Yes</text>

  <rect x="190" y="960" width="360" height="78" class="box" />
  <text x="370" y="998" text-anchor="middle" class="text">Navigate to required module</text>
  <text x="370" y="1020" text-anchor="middle" class="small">Vehicles, services, job cards, reports, inventory</text>
  <path d="M750 999 L550 999" class="arrow" />

  <rect x="190" y="1110" width="360" height="78" class="box" />
  <text x="370" y="1148" text-anchor="middle" class="text">Add, update, or view records</text>
  <text x="370" y="1170" text-anchor="middle" class="small">Perform workshop operations</text>
  <path d="M370 1038 L370 1110" class="arrow" />

  <rect x="750" y="1110" width="360" height="78" class="box" />
  <text x="930" y="1148" text-anchor="middle" class="text">Process request and access database</text>
  <text x="930" y="1170" text-anchor="middle" class="small">Handle API logic and persistence</text>
  <path d="M550 1149 L750 1149" class="arrow" />

  <rect x="750" y="1260" width="360" height="78" class="box" />
  <text x="930" y="1298" text-anchor="middle" class="text">Return updated data and status</text>
  <text x="930" y="1320" text-anchor="middle" class="small">Send response to the interface</text>
  <path d="M930 1188 L930 1260" class="arrow" />

  <rect x="190" y="1260" width="360" height="78" class="box" />
  <text x="370" y="1308" text-anchor="middle" class="text">Review results and continue work</text>
  <path d="M750 1299 L550 1299" class="arrow" />

  <polygon points="370,1445 465,1520 370,1595 275,1520" class="decision" />
  <text x="370" y="1513" text-anchor="middle" class="text">More</text>
  <text x="370" y="1535" text-anchor="middle" class="text">actions?</text>
  <path d="M370 1338 L370 1445" class="arrow" />

  <path d="M465 1520 L600 1520 L600 1149 L550 1149" class="arrow" />
  <text x="485" y="1507" class="yesno">Yes</text>

  <circle cx="370" cy="1635" r="22" class="startend" />
  <text x="370" y="1674" text-anchor="middle" class="small">End</text>
  <path d="M370 1595 L370 1613" class="arrow" />
  <text x="275" y="1613" class="yesno">No / Logout</text>
</svg>
