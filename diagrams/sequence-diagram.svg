<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1280" viewBox="0 0 1700 1280">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .head { font: 700 19px Arial, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2.2; rx: 16; ry: 16; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 10 8; }
      .msg { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #64748b; stroke-width: 2.1; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow2); }
      .act { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#334155" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#64748b" />
    </marker>
  </defs>

  <rect x="30" y="30" width="1640" height="1220" fill="#f8fbff" stroke="#dbeafe" stroke-width="2" rx="24" ry="24" />
  <text x="850" y="82" text-anchor="middle" class="title">Vehicle Management System Sequence Diagram</text>

  <g transform="translate(120,130)">
    <rect width="180" height="56" class="box" />
    <text x="90" y="35" text-anchor="middle" class="head">User</text>
  </g>
  <g transform="translate(470,130)">
    <rect width="220" height="56" class="box" />
    <text x="110" y="35" text-anchor="middle" class="head">React Frontend</text>
  </g>
  <g transform="translate(860,130)">
    <rect width="240" height="56" class="box" />
    <text x="120" y="35" text-anchor="middle" class="head">Node.js / Express API</text>
  </g>
  <g transform="translate(1250,130)">
    <rect width="220" height="56" class="box" />
    <text x="110" y="35" text-anchor="middle" class="head">MySQL Database</text>
  </g>

  <line x1="210" y1="186" x2="210" y2="1120" class="life" />
  <line x1="580" y1="186" x2="580" y2="1120" class="life" />
  <line x1="980" y1="186" x2="980" y2="1120" class="life" />
  <line x1="1360" y1="186" x2="1360" y2="1120" class="life" />

  <rect x="570" y="245" width="20" height="72" class="act" />
  <path d="M210 265 L570 265" class="msg" />
  <text x="390" y="246" text-anchor="middle" class="text">1. Open application / login page</text>

  <rect x="970" y="365" width="20" height="88" class="act" />
  <path d="M590 390 L970 390" class="msg" />
  <text x="780" y="370" text-anchor="middle" class="text">2. Submit username and password</text>

  <rect x="1350" y="500" width="20" height="104" class="act" />
  <path d="M990 530 L1350 530" class="msg" />
  <text x="1170" y="510" text-anchor="middle" class="text">3. Query user account and role</text>

  <path d="M1350 604 L990 604" class="ret" />
  <text x="1170" y="586" text-anchor="middle" class="small">4. Return user record</text>

  <path d="M970 675 L590 675" class="ret" />
  <text x="780" y="657" text-anchor="middle" class="small">5. Return token and role-based access</text>

  <path d="M570 745 L210 745" class="ret" />
  <text x="390" y="727" text-anchor="middle" class="small">6. Render dashboard</text>

  <rect x="570" y="825" width="20" height="96" class="act" />
  <path d="M210 855 L570 855" class="msg" />
  <text x="390" y="835" text-anchor="middle" class="text">7. Request vehicles, services, or job cards</text>

  <rect x="970" y="825" width="20" height="140" class="act" />
  <path d="M590 890 L970 890" class="msg" />
  <text x="780" y="870" text-anchor="middle" class="text">8. Send authenticated API request</text>

  <rect x="1350" y="845" width="20" height="120" class="act" />
  <path d="M990 920 L1350 920" class="msg" />
  <text x="1170" y="900" text-anchor="middle" class="text">9. Fetch workshop records</text>

  <path d="M1350 1000 L990 1000" class="ret" />
  <text x="1170" y="982" text-anchor="middle" class="small">10. Return result set</text>

  <path d="M970 1060 L590 1060" class="ret" />
  <text x="780" y="1042" text-anchor="middle" class="small">11. Return JSON response</text>

  <path d="M570 1120 L210 1120" class="ret" />
  <text x="390" y="1102" text-anchor="middle" class="small">12. Display records and status to user</text>

  <text x="850" y="1200" text-anchor="middle" class="small">The same interaction pattern is used for services, bills, reports, spare parts, batteries, and job cards.</text>
</svg>
