<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .actor { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .label { font: 16px Arial, sans-serif; fill: #1f2937; }
      .system { fill: #f8fbff; stroke: #93c5fd; stroke-width: 3; rx: 24; ry: 24; }
      .usecase { fill: #ffffff; stroke: #2563eb; stroke-width: 2.2; }
      .line { stroke: #334155; stroke-width: 2; fill: none; }
      .stick { stroke: #0f172a; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="30" y="30" width="1140" height="860" fill="#ffffff" stroke="#dbeafe" stroke-width="2" rx="24" ry="24" />
  <text x="600" y="78" text-anchor="middle" class="title">Super Admin Use Case Diagram</text>

  <rect x="290" y="120" width="790" height="710" class="system" />
  <text x="685" y="155" text-anchor="middle" class="actor">Vehicle Management System</text>

  <ellipse cx="470" cy="220" rx="120" ry="36" class="usecase" />
  <text x="470" y="225" text-anchor="middle" class="label">Login</text>

  <ellipse cx="470" cy="320" rx="130" ry="36" class="usecase" />
  <text x="470" y="325" text-anchor="middle" class="label">View Dashboard</text>

  <ellipse cx="470" cy="420" rx="155" ry="36" class="usecase" />
  <text x="470" y="425" text-anchor="middle" class="label">Manage Users &amp; Roles</text>

  <ellipse cx="470" cy="520" rx="130" ry="36" class="usecase" />
  <text x="470" y="525" text-anchor="middle" class="label">Manage Vehicles</text>

  <ellipse cx="470" cy="620" rx="130" ry="36" class="usecase" />
  <text x="470" y="625" text-anchor="middle" class="label">Manage Services</text>

  <ellipse cx="830" cy="220" rx="135" ry="36" class="usecase" />
  <text x="830" y="225" text-anchor="middle" class="label">Manage Job Cards</text>

  <ellipse cx="830" cy="320" rx="110" ry="36" class="usecase" />
  <text x="830" y="325" text-anchor="middle" class="label">Manage Bills</text>

  <ellipse cx="830" cy="420" rx="145" ry="36" class="usecase" />
  <text x="830" y="425" text-anchor="middle" class="label">Manage Spare Parts</text>

  <ellipse cx="830" cy="520" rx="135" ry="36" class="usecase" />
  <text x="830" y="525" text-anchor="middle" class="label">Manage Batteries</text>

  <ellipse cx="830" cy="620" rx="120" ry="36" class="usecase" />
  <text x="830" y="625" text-anchor="middle" class="label">View Reports</text>

  <ellipse cx="650" cy="740" rx="110" ry="36" class="usecase" />
  <text x="650" y="745" text-anchor="middle" class="label">Logout</text>

  <g transform="translate(120,370)">
    <circle cx="0" cy="0" r="20" class="stick" />
    <line x1="0" y1="20" x2="0" y2="90" class="stick" />
    <line x1="-35" y1="45" x2="35" y2="45" class="stick" />
    <line x1="0" y1="90" x2="-28" y2="140" class="stick" />
    <line x1="0" y1="90" x2="28" y2="140" class="stick" />
    <text x="0" y="175" text-anchor="middle" class="actor">Super Admin</text>
  </g>

  <line x1="155" y1="350" x2="350" y2="220" class="line" />
  <line x1="155" y1="370" x2="340" y2="320" class="line" />
  <line x1="155" y1="390" x2="315" y2="420" class="line" />
  <line x1="155" y1="410" x2="340" y2="520" class="line" />
  <line x1="155" y1="430" x2="340" y2="620" class="line" />
  <line x1="155" y1="420" x2="695" y2="220" class="line" />
  <line x1="155" y1="440" x2="720" y2="320" class="line" />
  <line x1="155" y1="460" x2="685" y2="420" class="line" />
  <line x1="155" y1="480" x2="695" y2="520" class="line" />
  <line x1="155" y1="500" x2="710" y2="620" class="line" />
  <line x1="155" y1="520" x2="540" y2="740" class="line" />
</svg>
